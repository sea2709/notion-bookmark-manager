<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Bookmarks Manager</title>
  <link rel="stylesheet" href="../styles/common.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <img src="../icons/icon32.png" width="20" height="20" alt="logo">
        <span class="header-title">Bookmarks Manager</span>
      </div>
      <div class="header-actions">
        <button id="btn-manage-view" class="btn-icon active" title="Manage bookmarks">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Manage</span>
        </button>
        <button id="btn-toggle-view" class="btn-icon" title="Browse bookmarks">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1" ry="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
          <span>Browse</span>
        </button>
        <button id="btn-search-view" class="btn-icon" title="Search bookmarks">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Search</span>
        </button>
      </div>
    </header>

    <!-- Save View -->
    <div id="view-save" class="view hidden">
      <div class="form-body">
        <div class="field">
          <label for="input-title">Title <span class="field-required">*</span></label>
          <input type="text" id="input-title" placeholder="Page title" autocomplete="off" required>
        </div>

        <div class="field">
          <label for="input-url">URL</label>
          <input type="url" id="input-url" placeholder="https://" readonly>
        </div>

        <div class="field" id="field-folder">
          <label>Folders</label>
          <div id="folder-tree" class="folder-tree">
            <div class="folder-loading">
              <div class="spinner"></div>
              <span>Loading folders...</span>
            </div>
          </div>
          <p class="field-hint">Select a folder to save into it. Hover to add (+) a subfolder or remove (−) an empty folder. Double-click a name to rename.</p>
        </div>

        <div class="field">
          <label for="input-prompt">Prompt</label>
          <textarea id="input-prompt" rows="3">Please provide a concise summary of the content on this webpage</textarea>
          <p class="field-hint">This prompt is to generate the content of the bookmark.</p>
        </div>

        <div class="field">
          <label for="input-notes">Notes</label>
          <textarea id="input-notes" rows="3" placeholder="Optional notes..."></textarea>
          <p class="field-hint">Personal notes or context about this bookmark.</p>
        </div>
      </div>

      <div class="form-footer">
        <div id="save-status" class="save-status hidden"></div>
        <button id="btn-save" class="btn btn-primary btn-full">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/>
            <polyline points="7,3 7,8 15,8"/>
          </svg>
          Save to Notion
        </button>
      </div>
    </div>

    <!-- Browse View -->
    <div id="view-browse" class="view hidden">
      <div class="recent-toolbar">
        <span class="recent-title">My Bookmarks</span>
        <button id="btn-refresh" class="btn-icon" title="Refresh from Notion">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div id="browse-list" class="recent-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Loading...</span>
        </div>
      </div>
    </div>

    <!-- Search View -->
    <div id="view-search" class="view hidden">
      <div class="search-toolbar">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="input-search" class="search-input" placeholder="Search bookmarks..." autocomplete="off">
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
